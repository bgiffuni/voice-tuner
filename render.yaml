# Render Blueprint — deploy Voice Tuner as a web service.
# https://render.com  →  New → Blueprint → pick this repo.
services:
  - type: web
    name: voice-tuner
    runtime: node
    # Starter (paid) is required for a persistent disk — the free plan's
    # filesystem is wiped on every deploy/restart.
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Server binds to $PORT (Render sets this automatically); env.ts reads it.
      - key: PORT
        value: 10000
      # Stable secret so sessions survive restarts (Render generates + pins it).
      - key: SESSION_SECRET
        generateValue: true
      # Mark cookies Secure (served over HTTPS on Render).
      - key: SECURE_COOKIES
        value: "1"
      # Store accounts, styles and shares on the persistent disk (see `disk:`
      # below) so they survive deploys and restarts.
      - key: DATA_DIR
        value: /var/data
      # Add your Anthropic key in the dashboard to enable live Claude analysis.
      # Without it, the app runs in offline demo mode.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional: restrict sign-ups to one email domain.
      # - key: ALLOWED_EMAIL_DOMAIN
      #   value: gonemo.ai
      #
      # Optional password-reset email (else links are logged to the service log).
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: 465
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: RESET_EMAIL_FROM
      #   value: Voice Tuner <noreply@gonemo.ai>

    # Persistent disk — durable storage for accounts, styles and shares.
    # DATA_DIR (above) points at this mount, so data survives deploys/restarts.
    disk:
      name: voice-tuner-data
      mountPath: /var/data
      sizeGB: 1
