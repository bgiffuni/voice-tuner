# Render Blueprint — deploy Voice Tuner as a web service.
# https://render.com  →  New → Blueprint → pick this repo.
services:
  - type: web
    name: voice-tuner
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Server binds to $PORT (Render sets this automatically); env.ts reads it.
      - key: PORT
        value: 10000
      # Stable secret so sessions survive restarts (Render generates + pins it).
      - key: SESSION_SECRET
        generateValue: true
      # Mark cookies Secure (served over HTTPS on Render).
      - key: SECURE_COOKIES
        value: "1"
      # Add your Anthropic key in the dashboard to enable live Claude analysis.
      # Without it, the app runs in offline demo mode.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional: restrict sign-ups to one email domain.
      # - key: ALLOWED_EMAIL_DOMAIN
      #   value: gonemo.ai
      #
      # Optional password-reset email (else links are logged to the service log).
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: 465
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: RESET_EMAIL_FROM
      #   value: Voice Tuner <noreply@gonemo.ai>

    # NOTE — free plan caveats:
    #   • The service sleeps after ~15 min idle (first request then takes ~30s).
    #   • Disk is EPHEMERAL: accounts and saved styles reset on each deploy/restart.
    # For durable storage, attach a persistent disk (paid plan) and point
    # DATA_DIR at it — uncomment below:
    # disk:
    #   name: voice-tuner-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # (then add an env var DATA_DIR=/var/data)
